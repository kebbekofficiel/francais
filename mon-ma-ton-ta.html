<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apprendre le francais - Mon/Ma et Ton/Ta</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #1a1208;
      --cream:  #f5f0e8;
      --gold:   #c8922a;
      --rust:   #8b3a1a;
      --pale:   #ede8dc;
      --blue:   #2a5c8b;
      --green:  #3a6b4a;
      --purple: #6b3a8b;
    }

    body {
      background-color: var(--cream);
      color: var(--ink);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(200,146,42,0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, rgba(139,58,26,0.07) 0%, transparent 55%);
    }

    .card {
      background: var(--cream);
      border: 1px solid rgba(200,146,42,0.35);
      box-shadow: 0 2px 6px rgba(0,0,0,0.08), 0 12px 40px rgba(0,0,0,0.10);
      max-width: 660px;
      width: 100%;
      padding: 3.5rem 3rem;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--rust), var(--gold), var(--rust));
    }

    .ornament {
      text-align: center;
      color: var(--gold);
      letter-spacing: .5rem;
      margin-bottom: 1.6rem;
      font-size: 1.2rem;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
      margin-bottom: .5rem;
    }

    .subtitle {
      text-align: center;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--rust);
      margin-bottom: 2.4rem;
    }

    .screen { animation: fadeIn .5s ease both; }
    .hidden { display: none !important; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* grille langues */
    .lang-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .85rem;
      margin-top: 1.8rem;
    }

    .lang-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .35rem;
      padding: .9rem .6rem;
      border: 1.5px solid rgba(200,146,42,0.3);
      background: transparent;
      cursor: pointer;
      font-family: 'Crimson Pro', serif;
      color: var(--ink);
      transition: all .2s ease;
    }

    .lang-flag {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--rust);
      font-family: 'Playfair Display', serif;
    }

    .lang-name { font-size: .95rem; }

    .lang-btn:hover,
    .lang-btn.selected {
      border-color: var(--gold);
      background: rgba(200,146,42,0.10);
      color: var(--rust);
    }

    .btn-continue {
      display: block;
      width: 100%;
      margin-top: 2rem;
      padding: 1rem 1.5rem;
      background: var(--ink);
      color: var(--cream);
      border: none;
      cursor: pointer;
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      letter-spacing: .06em;
      transition: background .2s, transform .15s;
    }
    .btn-continue:hover { background: var(--rust); transform: translateY(-1px); }
    .btn-continue:disabled { opacity: .35; cursor: default; transform: none; background: var(--ink); }

    /* ── contenu explication ── */
    p { line-height: 1.75; font-size: 1.05rem; margin-bottom: .8rem; }

    /* tableau 3 colonnes */
    .three-col {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: .7rem;
      margin: 1.4rem 0;
    }

    .col-box {
      background: var(--pale);
      padding: .9rem 1rem;
      border-top: 3px solid var(--gold);
    }
    .col-box.masc  { border-top-color: var(--blue); }
    .col-box.fem   { border-top-color: var(--rust); }
    .col-box.femv  { border-top-color: var(--purple); }

    .col-box h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      margin-bottom: .4rem;
    }

    .col-box p { font-size: .9rem; margin-bottom: 0; }

    /* tableau 2 colonnes */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .7rem;
      margin: 1.4rem 0;
    }

    /* tableau exemples */
    .ex-table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 1rem;
    }

    .ex-table th {
      font-family: 'Playfair Display', serif;
      font-size: .85rem;
      font-weight: 700;
      text-align: left;
      padding: .5rem .7rem;
      background: var(--pale);
      border-bottom: 2px solid var(--gold);
    }

    .ex-table td {
      padding: .45rem .7rem;
      border-bottom: 1px solid rgba(200,146,42,0.15);
      vertical-align: top;
    }

    .ex-table tr:last-child td { border-bottom: none; }

    .ex-table .fr {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--rust);
      font-size: 1.1rem;
    }

    .ex-table .label {
      font-size: .82rem;
      color: #777;
      font-style: italic;
    }

    /* alerte exception */
    .alert {
      background: rgba(107,58,139,0.08);
      border: 1.5px solid rgba(107,58,139,0.3);
      border-left: 4px solid var(--purple);
      padding: 1rem 1.2rem;
      margin: 1.4rem 0;
      font-size: 1rem;
      line-height: 1.7;
    }

    .alert strong { color: var(--purple); }

    .tip {
      border: 1px dashed rgba(200,146,42,0.4);
      padding: 1rem 1.2rem;
      font-size: .98rem;
      font-style: italic;
      color: #555;
      margin-top: 1.2rem;
      line-height: 1.6;
    }

    .divider {
      text-align: center;
      color: var(--gold);
      letter-spacing: .4rem;
      font-size: .8rem;
      margin: 1.4rem 0;
      opacity: .6;
    }

    .hl  { color: var(--rust); font-weight: 600; }
    .hlb { color: var(--blue); font-weight: 600; }
    .hlp { color: var(--purple); font-weight: 600; }

    .btn-back {
      background: transparent;
      border: 1px solid rgba(0,0,0,0.2);
      color: #777;
      font-family: 'Crimson Pro', serif;
      font-size: .95rem;
      cursor: pointer;
      padding: .5rem 1rem;
      margin-top: 1.8rem;
      transition: color .2s, border-color .2s;
    }
    .btn-back:hover { color: var(--rust); border-color: var(--rust); }

    .home-link {
      display: inline-block;
      margin-top: .6rem;
      margin-left: .8rem;
      font-size: .95rem;
      color: var(--gold);
      text-decoration: none;
    }
    .home-link:hover { text-decoration: underline; }

    @media (max-width: 500px) {
      .three-col { grid-template-columns: 1fr; }
      .two-col   { grid-template-columns: 1fr; }
      .card { padding: 2.5rem 1.5rem; }
    }
  </style>
</head>

function buildPage(lang) {
  var d = data[lang];
  var dir  = d.rtl ? 'direction:rtl;text-align:right;' : '';

  // boites 3 colonnes
  var boxHtml = '<div class="three-col">';
  for (var b = 0; b < d.boxes.length; b++) {
    boxHtml += '<div class="col-box ' + d.boxes[b].cls + '" style="' + dir + '">'
      + '<h3>' + d.boxes[b].t + '</h3>'
      + '<p>' + d.boxes[b].d + '</p>'
      + '</div>';
  }
  boxHtml += '</div>';

  // tableau
  var colCount = d.rows[0].length;
  var showNote = colCount > 5;
  var thHtml = '';
  for (var h = 0; h < d.tableHead.length; h++) {
    thHtml += '<th>' + d.tableHead[h] + '</th>';
  }
  if (showNote) thHtml += '<th></th>';

  var trHtml = '';
  for (var r = 0; r < d.rows.length; r++) {
    var row = d.rows[r];
    var isEx = row[5] && row[5] !== '';
    var rowStyle = isEx ? 'background:rgba(107,58,139,0.06);' : '';
    trHtml += '<tr style="' + rowStyle + '">';
    trHtml += '<td class="fr">' + row[0] + '</td>';
    for (var c = 1; c < 5; c++) {
      trHtml += '<td>' + row[c] + '</td>';
    }
    if (showNote) {
      trHtml += '<td><span style="color:var(--purple);font-size:.82rem;">' + (row[5] || '') + '</span></td>';
    }
    trHtml += '</tr>';
  }

  var tableHtml = '<table class="ex-table" style="' + dir + '">'
    + '<thead><tr>' + thHtml + '</tr></thead>'
    + '<tbody>' + trHtml + '</tbody>'
    + '</table>';

  return '<div class="ornament">* * *</div>'
    + '<h1>' + d.title + '</h1>'
    + '<p class="subtitle">' + d.sub + '</p>'
    + '<p style="' + dir + '">' + d.intro + '</p>'
    + boxHtml
    + '<div class="alert" style="' + dir + '"><strong>&#9733; ' + d.alertTitle + '</strong><br><br>' + d.alert + '</div>'
    + '<div class="divider">&#183; &#183; &#183;</div>'
    + tableHtml
    + '<div class="tip" style="' + dir + '">&#128161; ' + d.tip + '</div>'
    + '<div style="margin-top:1.8rem;">'
    + '<button class="btn-back" id="btnBack">&#8592; Revenir / Go back</button>'
    + '<a class="home-link" href="index.html">&#8962; Accueil</a>'
    + '</div>';
}

document.addEventListener('DOMContentLoaded', function() {
  var buttons = document.querySelectorAll('.lang-btn');
  for (var i = 0; i < buttons.length; i++) {
    buttons[i].addEventListener('click', function() {
      document.querySelectorAll('.lang-btn').forEach(function(b) {
        b.classList.remove('selected');
      });
      this.classList.add('selected');
      selectedLang = this.getAttribute('data-lang');
      document.getElementById('btnContinue').disabled = false;
    });
  }

  document.getElementById('btnContinue').addEventListener('click', function() {
    if (!selectedLang) return;
    var s1 = document.getElementById('screen1');
    var s2 = document.getElementById('screen2');
    s2.innerHTML = buildPage(selectedLang);
    s1.classList.add('hidden');
    s2.classList.remove('hidden');

    document.getElementById('btnBack').addEventListener('click', function() {
      s2.classList.add('hidden');
      s1.classList.remove('hidden');
    });
  });
});
</script>
