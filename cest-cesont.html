<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Apprendre le francais - C'est / Ce sont</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:   #1a1208;
      --cream: #f5f0e8;
      --gold:  #c8922a;
      --rust:  #8b3a1a;
      --pale:  #ede8dc;
      --green: #3a6b4a;
    }

    body {
      background-color: var(--cream);
      color: var(--ink);
      font-family: 'Crimson Pro', Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(200,146,42,0.08) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, rgba(139,58,26,0.07) 0%, transparent 55%);
    }

    .card {
      background: var(--cream);
      border: 1px solid rgba(200,146,42,0.35);
      box-shadow: 0 2px 6px rgba(0,0,0,0.08), 0 12px 40px rgba(0,0,0,0.10);
      max-width: 640px;
      width: 100%;
      padding: 3.5rem 3rem;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--rust), var(--gold), var(--rust));
    }

    .ornament {
      text-align: center;
      color: var(--gold);
      letter-spacing: .5rem;
      margin-bottom: 1.6rem;
      font-size: 1.2rem;
    }

    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700;
      line-height: 1.2;
      text-align: center;
      margin-bottom: .5rem;
    }

    .subtitle {
      text-align: center;
      font-style: italic;
      font-size: 1.05rem;
      color: var(--rust);
      margin-bottom: 2.4rem;
    }

    .screen { animation: fadeIn .5s ease both; }
    .hidden { display: none !important; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .lang-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .85rem;
      margin-top: 1.8rem;
    }

    .lang-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .35rem;
      padding: .9rem .6rem;
      border: 1.5px solid rgba(200,146,42,0.3);
      background: transparent;
      cursor: pointer;
      font-family: 'Crimson Pro', serif;
      color: var(--ink);
      transition: all .2s ease;
    }

    .lang-flag {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--rust);
      font-family: 'Playfair Display', serif;
    }

    .lang-name { font-size: .95rem; }

    .lang-btn:hover,
    .lang-btn.selected {
      border-color: var(--gold);
      background: rgba(200,146,42,0.10);
      color: var(--rust);
    }

    .btn-continue {
      display: block;
      width: 100%;
      margin-top: 2rem;
      padding: 1rem 1.5rem;
      background: var(--ink);
      color: var(--cream);
      border: none;
      cursor: pointer;
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      letter-spacing: .06em;
      transition: background .2s, transform .15s;
    }
    .btn-continue:hover { background: var(--rust); transform: translateY(-1px); }
    .btn-continue:disabled { opacity: .35; cursor: default; transform: none; background: var(--ink); }

    p { line-height: 1.75; font-size: 1.05rem; margin-bottom: .8rem; }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin: 1.4rem 0;
    }

    .col-box {
      background: var(--pale);
      padding: 1rem 1.2rem;
      border-top: 3px solid var(--gold);
    }
    .col-box.right { border-top-color: var(--green); }

    .col-box h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      margin-bottom: .5rem;
    }

    .example {
      display: flex;
      align-items: baseline;
      gap: .7rem;
      margin: .5rem 0;
      flex-wrap: wrap;
    }

    .example .fr {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.25rem;
      color: var(--rust);
    }

    .example .arrow { color: var(--gold); }

    .tip {
      border: 1px dashed rgba(200,146,42,0.4);
      padding: 1rem 1.2rem;
      font-size: .98rem;
      font-style: italic;
      color: #555;
      margin-top: 1.4rem;
      line-height: 1.6;
    }

    .divider {
      text-align: center;
      color: var(--gold);
      letter-spacing: .4rem;
      font-size: .8rem;
      margin: 1.6rem 0;
      opacity: .6;
    }

    .hl  { color: var(--rust); font-weight: 600; }
    .hlg { color: var(--green); font-weight: 600; }

    .btn-back {
      background: transparent;
      border: 1px solid rgba(0,0,0,0.2);
      color: #777;
      font-family: 'Crimson Pro', serif;
      font-size: .95rem;
      cursor: pointer;
      padding: .5rem 1rem;
      margin-top: 1.8rem;
      transition: color .2s, border-color .2s;
    }
    .btn-back:hover { color: var(--rust); border-color: var(--rust); }

    .home-link {
      display: inline-block;
      margin-top: .6rem;
      margin-left: .8rem;
      font-size: .95rem;
      color: var(--gold);
      text-decoration: none;
    }
    .home-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">

  <div id="screen1" class="screen">
    <div class="ornament">* * *</div>
    <h1>Quelle est votre langue maternelle ?</h1>
    <p class="subtitle">What is your native language?</p>

    <div class="lang-grid">
      <button class="lang-btn" data-lang="fr">
        <span class="lang-flag">FR</span>
        <span class="lang-name">Fran&#231;ais</span>
      </button>
      <button class="lang-btn" data-lang="en">
        <span class="lang-flag">EN</span>
        <span class="lang-name">English</span>
      </button>
      <button class="lang-btn" data-lang="es">
        <span class="lang-flag">ES</span>
        <span class="lang-name">Espa&#241;ol</span>
      </button>
      <button class="lang-btn" data-lang="pt">
        <span class="lang-flag">PT</span>
        <span class="lang-name">Portugu&#234;s</span>
      </button>
      <button class="lang-btn" data-lang="de">
        <span class="lang-flag">DE</span>
        <span class="lang-name">Deutsch</span>
      </button>
      <button class="lang-btn" data-lang="it">
        <span class="lang-flag">IT</span>
        <span class="lang-name">Italiano</span>
      </button>
      <button class="lang-btn" data-lang="ar">
        <span class="lang-flag">AR</span>
        <span class="lang-name">&#1575;&#1604;&#1593;&#1585;&#1576;&#1610;&#1577;</span>
      </button>
      <button class="lang-btn" data-lang="zh">
        <span class="lang-flag">ZH</span>
        <span class="lang-name">&#20013;&#25991;</span>
      </button>
    </div>

    <button class="btn-continue" id="btnContinue" disabled>
      Continuer &#8594;
    </button>
  </div>

  <div id="screen2" class="screen hidden"></div>

</div>

<script>
var selectedLang = null;

var explanations = {
  fr: {
    title: "C'est &nbsp;/&nbsp; Ce sont",
    sub: "Comment pr&#233;senter et identifier en fran&#231;ais",
    intro: "Ces deux expressions servent &#224; <strong>identifier</strong>, <strong>pr&#233;senter</strong> ou <strong>d&#233;crire</strong> quelqu'un ou quelque chose. Le choix d&#233;pend uniquement du nombre de ce qui suit.",
    col1title: "C'est + singulier",
    col1text: "Suivi d'un nom singulier ou d'un pronom.",
    col2title: "Ce sont + pluriel",
    col2text: "Suivi d'un nom au pluriel.",
    ex: [
      ["C'est un livre.", "Singulier"],
      ["C'est mon ami Paul.", "Pr&#233;sentation"],
      ["C'est beau !", "+ adjectif (toujours <em>c'est</em>)"],
      ["Ce sont des &#233;tudiants.", "Pluriel"],
      ["Ce sont mes amis.", "Pluriel avec possessif"]
    ],
    tip: "&#192; retenir : Avec un adjectif seul (c'est bon, c'est vrai&#8230;), on utilise toujours <em>c'est</em>, jamais <em>ce sont</em>.",
    rtl: false
  },
  en: {
    title: "C'est &nbsp;/&nbsp; Ce sont",
    sub: "How to say \"it is\" and \"they are\" in French",
    intro: "Both expressions translate roughly as <em>\"it is\"</em> or <em>\"they are\"</em> in English, but in French the choice depends on whether what follows is <strong>singular or plural</strong>.",
    col1title: "C'est = singular",
    col1text: "Used before a singular noun, a name, or a pronoun.",
    col2title: "Ce sont = plural",
    col2text: "Used before a plural noun.",
    ex: [
      ["C'est un livre.", "It's a book."],
      ["C'est mon ami Paul.", "This is my friend Paul."],
      ["C'est beau !", "It's beautiful! (adjective &#8594; always <em>c'est</em>)"],
      ["Ce sont des &#233;tudiants.", "They are students."],
      ["Ce sont mes amis.", "These are my friends."]
    ],
    tip: "Key tip: Before a lone adjective (c'est bon, c'est vrai&#8230;), always use <em>c'est</em> &mdash; never <em>ce sont</em>.",
    rtl: false
  },
  es: {
    title: "C'est &nbsp;/&nbsp; Ce sont",
    sub: "C&#243;mo decir \"es\" y \"son\" en franc&#233;s",
    intro: "Estas dos expresiones equivalen al espa&#241;ol <em>\"es\"</em> o <em>\"son\"</em>. La elecci&#243;n depende &#250;nicamente del n&#250;mero del sustantivo que sigue: <strong>singular o plural</strong>.",
    col1title: "C'est = singular",
    col1text: "Antes de un sustantivo singular, un nombre propio o un pronombre.",
    col2title: "Ce sont = plural",
    col2text: "Antes de un sustantivo en plural.",
    ex: [
      ["C'est un livre.", "Es un libro."],
      ["C'est mon ami Paul.", "Este es mi amigo Paul."],
      ["C'est beau !", "&#161;Es bonito! (adjetivo &#8594; siempre <em>c'est</em>)"],
      ["Ce sont des &#233;tudiants.", "Son estudiantes."],
      ["Ce sont mes amis.", "Estos son mis amigos."]
    ],
    tip: "Para recordar: Con un adjetivo solo (c'est bon, c'est vrai&#8230;), siempre se usa <em>c'est</em>, nunca <em>ce sont</em>.",
    rtl: false
  },
  pt: {
    title: "C'est &nbsp;/&nbsp; Ce sont",
    sub: "Como dizer \"&#233;\" e \"s&#227;o\" em franc&#234;s",
    intro: "Estas duas express&#245;es equivalem ao portugu&#234;s <em>\"&#233;\"</em> ou <em>\"s&#227;o\"</em>. A escolha depende apenas do n&#250;mero do que vem a seguir: <strong>singular ou plural</strong>.",
    col1title: "C'est = singular",
    col1text: "Antes de um substantivo singular, um nome pr&#243;prio ou pronome.",
    col2title: "Ce sont = plural",
    col2text: "Antes de um substantivo no plural.",
    ex: [
      ["C'est un livre.", "&#201; um livro."],
      ["C'est mon ami Paul.", "Este &#233; o meu amigo Paul."],
      ["C'est beau !", "&#201; bonito! (adjetivo &#8594; sempre <em>c'est</em>)"],
      ["Ce sont des &#233;tudiants.", "S&#227;o estudantes."],
      ["Ce sont mes amis.", "Estes s&#227;o os meus amigos."]
    ],
    tip: "Para lembrar: Com um adjetivo sozinho (c'est bon, c'est vrai&#8230;), usa-se sempre <em>c'est</em>, nunca <em>ce sont</em>.",
    rtl: false
  },
  de: {
    title: "C'est &nbsp;/&nbsp; Ce sont",
    sub: "\"Es ist\" und \"Es sind\" auf Franz&#246;sisch",
    intro: "Diese beiden Ausdr&#252;cke entsprechen dem deutschen <em>\"es ist\"</em> bzw. <em>\"es sind\"</em>. Die Wahl h&#228;ngt allein vom Numerus des folgenden Nomens ab: <strong>Singular oder Plural</strong>.",
    col1title: "C'est = Singular",
    col1text: "Vor einem Singular-Nomen, einem Eigennamen oder Pronomen.",
    col2title: "Ce sont = Plural",
    col2text: "Vor einem Nomen im Plural.",
    ex: [
      ["C'est un livre.", "Es ist ein Buch."],
      ["C'est mon ami Paul.", "Das ist mein Freund Paul."],
      ["C'est beau !", "Es ist sch&#246;n! (Adjektiv &#8594; immer <em>c'est</em>)"],
      ["Ce sont des &#233;tudiants.", "Es sind Studierende."],
      ["Ce sont mes amis.", "Das sind meine Freunde."]
    ],
    tip: "Merkhilfe: Vor einem alleinstehenden Adjektiv (c'est bon, c'est vrai&#8230;) steht immer <em>c'est</em> &mdash; nie <em>ce sont</em>.",
    rtl: false
  },
  it: {
    title: "C'est &nbsp;/&nbsp; Ce sont",
    sub: "Come dire \"&#232;\" e \"sono\" in francese",
    intro: "Queste due espressioni corrispondono all'italiano <em>\"&#232;\"</em> e <em>\"sono\"</em>. La scelta dipende unicamente dal numero del sostantivo che segue: <strong>singolare o plurale</strong>.",
    col1title: "C'est = singolare",
    col1text: "Prima di un sostantivo singolare, un nome proprio o un pronome.",
    col2title: "Ce sont = plurale",
    col2text: "Prima di un sostantivo al plurale.",
    ex: [
      ["C'est un livre.", "&#200; un libro."],
      ["C'est mon ami Paul.", "Questo &#232; il mio amico Paul."],
      ["C'est beau !", "&#200; bello! (aggettivo &#8594; sempre <em>c'est</em>)"],
      ["Ce sont des &#233;tudiants.", "Sono studenti."],
      ["Ce sont mes amis.", "Questi sono i miei amici."]
    ],
    tip: "Da ricordare: Con un aggettivo solo (c'est bon, c'est vrai&#8230;), si usa sempre <em>c'est</em>, mai <em>ce sont</em>.",
    rtl: false
  },
  ar: {
    title: "C'est &nbsp;/&nbsp; Ce sont",
    sub: "كيف تقول «هو/هي» و«هم/هن» بالفرنسية",
    intro: "هاتان العبارتان تعادلان في العربية «هو/هي» و«هم/هن». الاختيار يعتمد فقط على عدد الاسم الذي يليهما: <strong>مفرد أو جمع</strong>.",
    col1title: "C'est = مفرد",
    col1text: "قبل اسم مفرد أو اسم علم أو ضمير.",
    col2title: "Ce sont = جمع",
    col2text: "قبل اسم في صيغة الجمع.",
    ex: [
      ["C'est un livre.", "إنه كتاب."],
      ["C'est mon ami Paul.", "هذا صديقي بول."],
      ["C'est beau !", "إنه جميل! (صفة ← دائماً c'est)"],
      ["Ce sont des étudiants.", "هم طلاب."],
      ["Ce sont mes amis.", "هؤلاء أصدقائي."]
    ],
    tip: "للتذكر: مع الصفة المنفردة نستخدم دائماً c'est، لا ce sont أبداً.",
    rtl: true
  },
  zh: {
    title: "C'est &nbsp;/&nbsp; Ce sont",
    sub: "法语中如何说「这是」和「这些是」",
    intro: "这两个表达相当于中文的「这是」和「这些是」。选择哪个，只取决于后面名词的<strong>单复数</strong>。",
    col1title: "C'est = 单数",
    col1text: "用于单数名词、专有名词或代词之前。",
    col2title: "Ce sont = 复数",
    col2text: "用于复数名词之前。",
    ex: [
      ["C'est un livre.", "这是一本书。"],
      ["C'est mon ami Paul.", "这是我的朋友保罗。"],
      ["C'est beau !", "真美！（形容词 → 永远用 c'est）"],
      ["Ce sont des étudiants.", "他们是学生。"],
      ["Ce sont mes amis.", "这些是我的朋友们。"]
    ],
    tip: "要记住：单独跟形容词时，永远用 c'est，绝不用 ce sont。",
    rtl: false
  }
};

function buildExplanation(lang) {
  var d = explanations[lang];
  var dir = d.rtl ? 'direction:rtl;text-align:right;' : '';
  var arrow = d.rtl ? '&#8592;' : '&#8594;';
  var rowDir = d.rtl ? 'flex-direction:row-reverse;' : '';

  var exHtml = '';
  for (var i = 0; i < d.ex.length; i++) {
    exHtml += '<div class="example" style="' + rowDir + '">'
      + '<span class="fr">' + d.ex[i][0] + '</span>'
      + '<span class="arrow">' + arrow + '</span>'
      + '<span style="' + dir + '">' + d.ex[i][1] + '</span>'
      + '</div>';
  }

  return '<div class="ornament">* * *</div>'
    + '<h1>' + d.title + '</h1>'
    + '<p class="subtitle">' + d.sub + '</p>'
    + '<p style="' + dir + '">' + d.intro + '</p>'
    + '<div class="two-col">'
    + '<div class="col-box" style="' + dir + '"><h3><span class="hl">' + d.col1title + '</span></h3><p style="font-size:.95rem;">' + d.col1text + '</p></div>'
    + '<div class="col-box right" style="' + dir + '"><h3><span class="hlg">' + d.col2title + '</span></h3><p style="font-size:.95rem;">' + d.col2text + '</p></div>'
    + '</div>'
    + '<div class="divider">&#183; &#183; &#183;</div>'
    + '<p style="' + dir + '"><strong>' + (d.rtl ? 'أمثلة:' : (lang === 'zh' ? '例句：' : 'Exemples / Examples :')) + '</strong></p>'
    + exHtml
    + '<div class="tip" style="' + dir + '">&#128161; ' + d.tip + '</div>'
    + '<div style="margin-top:1.8rem;">'
    + '<button class="btn-back" id="btnBack">&#8592; Revenir / Go back</button>'
    + '<a class="home-link" href="index.html">&#8962; Accueil</a>'
    + '</div>';
}

document.addEventListener('DOMContentLoaded', function() {
  var buttons = document.querySelectorAll('.lang-btn');
  for (var i = 0; i < buttons.length; i++) {
    buttons[i].addEventListener('click', function() {
      document.querySelectorAll('.lang-btn').forEach(function(b) {
        b.classList.remove('selected');
      });
      this.classList.add('selected');
      selectedLang = this.getAttribute('data-lang');
      document.getElementById('btnContinue').disabled = false;
    });
  }

  document.getElementById('btnContinue').addEventListener('click', function() {
    if (!selectedLang) return;
    var s1 = document.getElementById('screen1');
    var s2 = document.getElementById('screen2');
    s2.innerHTML = buildExplanation(selectedLang);
    s1.classList.add('hidden');
    s2.classList.remove('hidden');

    document.getElementById('btnBack').addEventListener('click', function() {
      s2.classList.add('hidden');
      s1.classList.remove('hidden');
    });
  });
});
</script>
</body>
</html>
